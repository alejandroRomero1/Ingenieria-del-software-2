<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pasarela de Pago Segura</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h4>💳 Pasarela de Pago Segura</h4>
                    </div>
                    <div class="card-body p-4">
                        <p class="text-muted small text-center">Hotel Rio & Cielo</p>
                        <h5 class="text-center mb-4">Total a pagar: <strong>${{ precio }}</strong></h5>
                        
                        <form action="{% url 'exito' %}" method="GET">
                            <input type="hidden" name="habitacion_id" value="{{ hab_id }}">
                            <input type="hidden" name="inicio" value="{{ inicio }}">
                            <input type="hidden" name="fin" value="{{ fin }}">

                            <div class="mb-3">
                                <label class="form-label">Número de Tarjeta</label>
                                <input type="text" class="form-control" placeholder="0000 0000 0000 0000" required>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Vencimiento</label>
                                    <input type="text" class="form-control" placeholder="MM/AA" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">CVV</label>
                                    <input type="text" class="form-control" placeholder="123" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-success btn-lg w-100 mt-3">Confirmar y Pagar</button>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>
</body>
</html>
